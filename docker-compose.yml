services:
  core-service:
    build:
      context: ./core-service
    image: silver-carnival/core-service:latest
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
        monitor: 30s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/core/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  processing-service:
    build:
      context: ./processing-service
    image: silver-carnival/processing-service:latest
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
        monitor: 30s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/api/processing/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  import-service:
    build:
      context: ./import-service
    image: silver-carnival/import-service:latest
    ports:
      - "8083:8083"
    deploy:
      update_config:
        parallelism: 1
        delay: 10s
        order: stop-first
        failure_action: rollback
        monitor: 30s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/api/import/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  task-service:
    build:
      context: ./task-service
    image: silver-carnival/task-service:latest
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
        monitor: 30s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/api/task/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  proxy:
    build:
      context: ./proxy
    image: silver-carnival/proxy:latest
    ports:
      - "8080:8080"
    deploy:
      update_config:
        parallelism: 1
        delay: 10s
        order: stop-first
        failure_action: rollback
        monitor: 30s
    depends_on:
      core-service:
        condition: service_healthy
      processing-service:
        condition: service_healthy
      import-service:
        condition: service_healthy
      task-service:
        condition: service_healthy
