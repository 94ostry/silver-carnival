events {}

http {
    server {
        listen 8080;

        location /core/ {
            rewrite ^/core/(.*)$ /api/core/$1 break;
            proxy_pass http://core-service:8081;
        }

        location /processing/ {
            rewrite ^/processing/(.*)$ /api/processing/$1 break;
            proxy_pass http://processing-service:8082;
        }

        location /import/ {
            rewrite ^/import/(.*)$ /api/import/$1 break;
            proxy_pass http://import-service:8083;
        }

        location /task/ {
            rewrite ^/task/(.*)$ /api/task/$1 break;
            proxy_pass http://task-service:8084;
        }
    }
}
